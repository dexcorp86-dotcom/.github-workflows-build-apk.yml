name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js Engine
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova Compiler
        run: npm install -g cordova

      - name: Create Android Project Wrapper
        run: |
          cordova create eps-app com.neon.epskalkulator "EPS Neon"
          cd eps-app
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/index.html

      - name: Set up Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Compile Standalone APK
        run: |
          cd eps-app
          cordova build android --device

      - name: Deliver Ready-to-Install App
        uses: actions/upload-artifact@v4
        with:
          name: EPS-Neon-Calculator-APK
          path: eps-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk